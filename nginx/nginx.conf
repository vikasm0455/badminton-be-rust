# RallyUp reverse proxy: /api/* + /health -> Rust API, everything else -> Next.js.
server {
    listen 80;
    server_name _;

    # Keep this >= the API's DefaultBodyLimit (max_upload_size_mb + 10 = 25MB) so
    # nginx forwards the upload and lets the API return a clean 413/200 rather
    # than cutting the body off itself. Clients downscale images to ~1MB anyway.
    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # API
    location /api/ {
        proxy_pass http://badminton-api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        # OCR (Claude Vision) can take a few seconds; don't cut it short.
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SSE stream — disable buffering so events flush immediately.
    location /api/reservations/stream {
        proxy_pass http://badminton-api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = /health {
        proxy_pass http://badminton-api:8090/health;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://badminton-fe:3090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers on the document responses (OWASP A05). HSTS here makes
        # the browser enforce HTTPS for the whole origin, including /api. The CSP
        # keeps everything same-origin; 'unsafe-inline' is required because Next's
        # hydration uses inline scripts/styles without nonces (can be tightened to
        # a nonce-based CSP later). Only this location sets add_header, so the API
        # keeps the headers it already sets itself (no duplicates).
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "microphone=(), geolocation=()" always;
    }
}
