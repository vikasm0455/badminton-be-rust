# RallyUp reverse proxy: /api/* + /health -> Rust API, everything else -> Next.js.
server {
    listen 80;
    server_name _;

    client_max_body_size 12m; # allow credential screenshot uploads (10MB + slack)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # API
    location /api/ {
        proxy_pass http://badminton-api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # SSE stream — disable buffering so events flush immediately.
    location /api/reservations/stream {
        proxy_pass http://badminton-api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = /health {
        proxy_pass http://badminton-api:8090/health;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://badminton-fe:3090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
