name: audit
on:
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock", ".github/workflows/audit.yml"]
  pull_request:
    paths: ["Cargo.toml", "Cargo.lock"]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catch newly-published advisories

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
